# Pre-commit hooks — run automatically before every `git commit`
# Install once: make git-setup
# Run manually:  pre-commit run --all-files

repos:

  # ── Code quality (ruff — lint + format) ───────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: [--fix]           # auto-fix safe issues
      - id: ruff-format         # enforce consistent formatting

  # ── General hygiene ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]    # block files > 1MB (e.g. accidental model weights)
      - id: check-case-conflict
      - id: detect-private-key  # catches RSA/SSH private keys

  # ── Secret detection — blocks commits with API keys, tokens, passwords ─────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
