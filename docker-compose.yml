version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobsignals_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobsignals}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobsignals_dev}
      POSTGRES_DB: ${POSTGRES_DB:-jobsignals}
    ports:
      - "5432:5432"
    volumes:
      - jobsignals_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobsignals}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jobsignals_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@jobsignals.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - jobsignals_pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  jobsignals_pgdata:
  jobsignals_pgadmin:
