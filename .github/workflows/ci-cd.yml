name: CI / CD

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["**"]          # lint + test on every branch push
  pull_request:
    branches: [main]          # lint + test on all PRs targeting main

# ── Shared config ─────────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"

# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Check code style
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  # ── 2. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobsignals
          POSTGRES_PASSWORD: jobsignals_test
          POSTGRES_DB: jobsignals_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://jobsignals:jobsignals_test@localhost:5432/jobsignals_test
      # LLM key injected from GitHub secrets — tests that call Groq will be skipped
      # if the secret is not set (secrets are not passed to forks for security)
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt pytest pytest-asyncio httpx

      - name: Apply database schema
        run: psql "$DATABASE_URL" -f db/schema.sql
        env:
          DATABASE_URL: postgresql://jobsignals:jobsignals_test@localhost:5432/jobsignals_test

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 3. Deploy — runs only on push to main after tests pass ───────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on direct push to main (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Railway deployment
        # RAILWAY_DEPLOY_HOOK_URL — set this in:
        # GitHub repo → Settings → Secrets → Actions → New secret
        # Get the hook URL from: Railway dashboard → your service → Settings → Deploy Hooks
        run: |
          echo "Triggering Railway deploy..."
          curl --fail-with-body -s -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}"
          echo "Deploy triggered — check Railway dashboard for build status."
