name: Ingest Jobs

# ── Runs every 3 hours + can be triggered manually ────────────────────────────
on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours (00:00, 03:00, 06:00 ... UTC)
  workflow_dispatch:         # manual trigger from GitHub Actions tab

env:
  PYTHON_VERSION: "3.11"

jobs:
  ingest:
    name: Fetch live job postings
    runs-on: ubuntu-latest

    env:
      DATABASE_URL:    ${{ secrets.RENDER_DATABASE_URL }}
      GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
      ADZUNA_APP_ID:   ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY:  ${{ secrets.ADZUNA_APP_KEY }}
      JOOBLE_API_KEY:  ${{ secrets.JOOBLE_API_KEY }}
      SERPAPI_KEY:     ${{ secrets.SERPAPI_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run ingestion
        run: python -m scripts.ingest_real

      - name: Run aggregations (refresh dashboard stats)
        run: python -c "from pipeline.aggregations import run_all_aggregations; run_all_aggregations()"
